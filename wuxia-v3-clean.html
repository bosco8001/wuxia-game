<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書劍 — 測試版本三</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
:root {
  --bg-deep:#1a1510; --bg-mid:#211a14; --border: rgba(74,58,46,0.6);
  --accent: #c0392b; --accent-dim: #8a2a1e; --danger: #e04030;
  --gold: #c8922a; --shadow-md: 0 8px 32px rgba(0,0,0,0.55);
  --transition: 220ms cubic-bezier(0.16,1,0.3,1);
  --font-display: 'Ma Shan Zheng','Noto Serif SC',serif;
  --font-body: 'Noto Serif SC',serif;
  --red:#c0392b; --red-dim:#8a2a1e; --red-bright:#e04030;
  --text-main:#e8d8c0; --text-dim:#b09878; --text-ghost:#6a5a4a;
}
body { min-height:100dvh; font-family:var(--font-body); color:var(--text-main); background:var(--bg-deep); overflow-x:hidden; }
.bg-wash { position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 90% 55% at 50% 0%,rgba(160,40,20,0.14) 0%,transparent 60%),
    linear-gradient(175deg,#1a1510 0%,#1e1812 40%,#16120e 100%); }
.screen { position:relative; z-index:1; display:none; }
.screen.active { display:flex; }

/* INTRO */
#screen-intro { flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:2rem 1rem 5rem; text-align:center; }
.intro-title { font-family:var(--font-display); font-size:clamp(2.8rem,9vw,5rem); color:var(--text-main); letter-spacing:0.2em; line-height:1.1; margin-bottom:0.3rem; text-shadow:0 0 40px rgba(192,57,43,0.4); }
.intro-subtitle { font-size:0.75rem; color:#a89880; letter-spacing:0.4em; margin-bottom:0.5rem; }
.version-badge { display:inline-block; font-size:0.58rem; letter-spacing:0.22em; color:var(--red); border:1px solid rgba(192,57,43,0.35); border-radius:2px; padding:0.13rem 0.55rem; margin-bottom:1.5rem; background:rgba(192,57,43,0.06); }
.brush-line { width:160px; height:1px; background:linear-gradient(90deg,transparent,rgba(192,57,43,0.45),transparent); margin:0 auto 1.75rem; }
.intro-card { background:rgba(42,33,26,0.93); border:1px solid var(--border); border-radius:1.5rem; padding:1.75rem; width:100%; max-width:400px; backdrop-filter:blur(16px); box-shadow:var(--shadow-md); display:flex; flex-direction:column; gap:1rem; }
.form-label { display:block; font-size:0.7rem; color:var(--text-dim); letter-spacing:0.28em; margin-bottom:0.35rem; }
.name-input { width:100%; background:rgba(26,21,16,0.85); border:1px solid var(--border); border-radius:0.6rem; padding:0.65rem 1rem; font-family:var(--font-body); font-size:0.95rem; color:var(--text-main); text-align:center; letter-spacing:0.12em; outline:none; }
.name-input:focus { border-color:var(--red-dim); box-shadow:0 0 0 3px rgba(192,57,43,0.15); }
.name-input::placeholder { color:var(--text-ghost); }
.origin-page { display:none; }
.origin-page.active { display:flex; flex-direction:column; gap:0.4rem; }
.origin-btn { background:rgba(26,21,16,0.65); border:1px solid var(--border); border-radius:0.75rem; padding:0.6rem 0.9rem; color:var(--text-dim); font-family:var(--font-body); font-size:0.8rem; cursor:pointer; transition:all var(--transition); text-align:left; display:flex; align-items:center; gap:0.65rem; }
.origin-btn:hover { border-color:var(--red-dim); color:var(--text-main); background:rgba(192,57,43,0.08); }
.origin-btn.selected { border-color:var(--red); color:#e04030; background:rgba(192,57,43,0.12); }
.origin-btn .ob-icon { font-size:1.1em; flex-shrink:0; }
.origin-btn .ob-text { flex:1; }
.origin-btn .ob-hint { font-size:0.6rem; text-align:right; line-height:1.7; }
.origin-btn .ob-hint .hint-label { font-size:0.58rem; color:#d4b890; display:block; }
.origin-btn .ob-hint .hint-val { color:#ffd080; }
.page-nav { display:flex; gap:0.5rem; justify-content:center; }
.page-nav-btn { background:rgba(26,21,16,0.7); border:1px solid var(--border); border-radius:0.5rem; padding:0.4rem 0.9rem; font-family:var(--font-body); font-size:0.72rem; color:var(--text-ghost); cursor:pointer; transition:all var(--transition); }
.page-nav-btn:hover { border-color:var(--red-dim); color:var(--text-main); }
.page-nav-btn.active-pg { border-color:var(--red); color:#e04030; background:rgba(192,57,43,0.08); }
.start-btn { width:100%; background:linear-gradient(135deg,var(--red-dim) 0%,var(--red) 100%); border:1px solid rgba(192,57,43,0.5); border-radius:0.7rem; padding:0.82rem; color:var(--text-main); font-family:var(--font-display); font-size:1.15rem; letter-spacing:0.22em; cursor:pointer; box-shadow:0 4px 20px rgba(192,57,43,0.3); transition:all var(--transition); }
.start-btn:hover { transform:translateY(-1px); }
.api-details { width:100%; max-width:400px; margin-top:0.5rem; }
.api-details summary { font-size:0.68rem; color:var(--text-ghost); letter-spacing:0.18em; cursor:pointer; list-style:none; text-align:center; padding:0.4rem; }
.api-details summary::-webkit-details-marker { display:none; }
.api-details summary::after { content:' ▾'; }
details[open] summary::after { content:' ▴'; }
.api-inner { background:rgba(26,21,16,0.93); border:1px solid var(--border); border-radius:0.75rem; padding:0.9rem; margin-top:0.4rem; display:flex; flex-direction:column; gap:0.5rem; }
.api-inner select, .api-inner input { width:100%; background:rgba(26,21,16,0.9); border:1px solid var(--border); border-radius:0.45rem; padding:0.42rem 0.7rem; font-family:var(--font-body); font-size:0.75rem; color:var(--text-main); outline:none; }
.api-note { font-size:0.65rem; color:var(--text-ghost); line-height:1.8; }
.api-note a { color:var(--accent-dim); }

/* GAME */
#screen-game { flex-direction:column; min-height:100dvh; }
.topbar { position:sticky; top:0; z-index:10; background:rgba(26,21,16,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0.55rem 1.25rem; display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
.topbar-left { display:flex; flex-direction:column; gap:0.08rem; }
.topbar-title { font-family:var(--font-display); font-size:1rem; color:var(--text-main); letter-spacing:0.18em; }
.topbar-sub { font-size:0.55rem; color:var(--text-ghost); letter-spacing:0.18em; }
.stats-grid { display:grid; grid-template-columns:repeat(4,auto); gap:0.3rem; }
.stat-chip { display:flex; align-items:center; gap:0.22rem; font-size:0.78rem; background:rgba(26,21,16,0.75); border:1px solid var(--border); border-radius:999px; padding:0.22rem 0.72rem; white-space:nowrap; }
.stat-chip .sl { color:var(--text-ghost); font-size:0.8em; }
.stat-chip .sv { color:var(--text-main); font-weight:600; }
.stat-chip.hp .sl { color:#ffcc44; }
.stat-chip.hp .sv { color:#ff8870; }
.stat-chip.gold .sv { color:#c8922a; }
.stat-chip.rank .sv { color:var(--accent); font-size:0.72em; }
.game-layout { flex:1; max-width:780px; margin:0 auto; width:100%; padding:1.5rem 1rem 5rem; display:flex; flex-direction:column; gap:1rem; }
.story-card { background:rgba(30,24,18,0.92); border:1px solid var(--border); border-radius:1.2rem; padding:1.5rem; position:relative; }
.chapter-label { font-size:0.6rem; color:var(--text-ghost); letter-spacing:0.3em; display:block; margin-bottom:0.8rem; }
#story-text { font-size:0.96rem; line-height:2.15; color:var(--text-main); min-height:4rem; white-space:pre-wrap; }
.cursor { display:inline-block; width:2px; height:1em; background:var(--text-dim); animation:blink 1s infinite; vertical-align:text-bottom; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.loading { display:none; text-align:center; padding:1rem; color:var(--text-ghost); font-size:0.75rem; letter-spacing:0.2em; }
.loading.active { display:block; }
.loading::after { content:''; display:inline-block; width:0.5rem; height:0.5rem; border-radius:50%; background:var(--text-ghost); animation:pulse 1s infinite; margin-left:0.4rem; }
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
.error-banner { display:none; background:rgba(192,57,43,0.12); border:1px solid rgba(192,57,43,0.4); border-radius:0.6rem; padding:0.6rem 0.9rem; font-size:0.72rem; color:#e04030; margin-top:0.5rem; }
.error-banner.show { display:block; }
.choices-section { display:flex; flex-direction:column; gap:0.5rem; }
.choices-label { font-size:0.58rem; color:var(--text-ghost); letter-spacing:0.25em; }
.choice-btn { background:rgba(30,24,18,0.85); border:1px solid var(--border); border-radius:0.8rem; padding:0.78rem 1rem; color:var(--text-dim); font-family:var(--font-body); font-size:0.85rem; cursor:pointer; transition:all var(--transition); text-align:left; display:flex; align-items:center; gap:0.7rem; }
.choice-btn:hover:not(:disabled) { border-color:rgba(192,57,43,0.5); color:var(--text-main); background:rgba(192,57,43,0.06); }
.choice-btn:disabled { opacity:0.45; cursor:not-allowed; }
.choice-num { font-size:0.65rem; color:var(--text-ghost); min-width:1rem; }
.choice-text { flex:1; line-height:1.6; }
.panels-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
@media(max-width:600px){ .panels-row{grid-template-columns:1fr;} }
.panel-card { background:rgba(30,24,18,0.9); border:1px solid var(--border); border-radius:0.9rem; padding:0.9rem 1rem; }
.panel-title { font-size:0.62rem; color:var(--text-ghost); letter-spacing:0.25em; margin-bottom:0.55rem; }
.rep-row { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.32rem; }
.rep-name { font-size:0.65rem; color:var(--text-dim); width:52px; flex-shrink:0; }
.rep-bar-bg { flex:1; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.rep-bar { height:100%; border-radius:2px; transition:width 0.5s; width:50%; }
.rep-val { font-size:0.6rem; color:var(--text-ghost); width:28px; text-align:right; }
.rb-chaoting { background:#4488cc; } .rb-sanfan { background:#cc8844; } .rb-wulin { background:#44aa66; }
.rb-xuelian { background:#aa44aa; } .rb-zhuhong { background:#cc4444; }
.attr-row { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.28rem; }
.attr-name { font-size:0.65rem; color:var(--text-dim); width:32px; }
.attr-bar-bg { flex:1; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.attr-bar { height:100%; background:var(--gold); border-radius:2px; transition:width 0.5s; }
.attr-val { font-size:0.6rem; color:var(--text-ghost); width:24px; text-align:right; }
.item-list { display:flex; flex-wrap:wrap; gap:0.3rem; }
.item-tag { font-size:0.68rem; color:var(--text-dim); padding:0.2rem 0.55rem; border:1px solid var(--border); border-radius:0.4rem; background:rgba(26,21,16,0.5); display:inline-block; }
.clue-item { font-size:0.7rem; color:#88aacc; padding:0.2rem 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.history-item { font-size:0.68rem; color:var(--text-dim); padding:0.3rem 0; border-bottom:1px solid rgba(255,255,255,0.04); line-height:1.7; }
.hi-c { color:var(--gold); display:block; font-size:0.65rem; }
.save-row { display:flex; gap:0.4rem; flex-wrap:wrap; }
.sv-btn { background:rgba(26,21,16,0.8); border:1px solid var(--border); border-radius:0.5rem; padding:0.35rem 0.7rem; font-family:var(--font-body); font-size:0.68rem; color:var(--text-ghost); cursor:pointer; }
.sv-btn:hover { border-color:var(--gold); color:var(--gold); }

/* Item category */
.cat-filter-bar { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:0.5rem; }
.cat-btn { font-size:0.6rem; padding:0.18rem 0.5rem; border-radius:0.35rem; border:1px solid; cursor:pointer; letter-spacing:0.05em; background:transparent; transition:all 0.2s; color:inherit; }
.cat-btn.active { color:#111 !important; }
.c-all  { border-color:#aaa; color:#aaa; } .c-all.active  { background:#aaa; }
.c-武器 { border-color:#e07070; color:#e07070; } .c-武器.active { background:#e07070; }
.c-丹藥 { border-color:#70c070; color:#70c070; } .c-丹藥.active { background:#70c070; }
.c-裝備 { border-color:#70a0e0; color:#70a0e0; } .c-裝備.active { background:#70a0e0; }
.c-材料 { border-color:#c0a050; color:#c0a050; } .c-材料.active { background:#c0a050; }
.c-秘籍 { border-color:#c070c0; color:#c070c0; } .c-秘籍.active { background:#c070c0; }
.c-暗器 { border-color:#e09050; color:#e09050; } .c-暗器.active { background:#e09050; }
.c-劇情 { border-color:#f0d060; color:#f0d060; } .c-劇情.active { background:#f0d060; }
.c-其他 { border-color:#909090; color:#909090; } .c-其他.active { background:#909090; }
.item-group-label { font-size:0.55rem; letter-spacing:0.2em; color:var(--text-ghost); margin:0.4rem 0 0.2rem; display:block; }

/* Info drawer */
#info-btn { position:fixed; bottom:5.5rem; right:1rem; z-index:200; width:2.6rem; height:2.6rem; border-radius:50%; background:rgba(44,34,20,0.92); border:1px solid var(--border); color:var(--text-dim); font-size:1.1rem; cursor:pointer; display:none; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.4); }
#info-overlay { position:fixed; inset:0; z-index:299; background:rgba(0,0,0,0.4); display:none; }
#info-drawer { position:fixed; top:0; right:-320px; width:300px; height:100vh; z-index:300; background:rgba(22,17,11,0.97); border-left:1px solid var(--border); backdrop-filter:blur(12px); transition:right 0.3s ease; display:flex; flex-direction:column; overflow:hidden; }
#info-drawer.open { right:0; }
#info-drawer-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.1rem 0.6rem; border-bottom:1px solid var(--border); }
#info-drawer-header h3 { font-size:0.75rem; letter-spacing:0.2em; color:var(--text-dim); margin:0; }
#info-close { background:none; border:none; color:var(--text-ghost); font-size:1.1rem; cursor:pointer; padding:0.2rem 0.4rem; }
.info-tabs { display:flex; border-bottom:1px solid var(--border); }
.info-tab { flex:1; padding:0.5rem; font-size:0.65rem; letter-spacing:0.15em; color:var(--text-ghost); background:none; border:none; cursor:pointer; }
.info-tab.active { color:var(--gold); border-bottom:1px solid var(--gold); }
.info-content { flex:1; overflow-y:auto; padding:0.9rem 1rem; }
.info-attr-row { margin-bottom:0.9rem; }
.info-attr-name { font-size:0.72rem; color:var(--gold); }
.info-attr-val { font-size:0.7rem; color:var(--text-main); margin-left:0.4rem; }
.info-attr-desc { font-size:0.65rem; color:var(--text-dim); line-height:1.7; margin-top:0.2rem; }
.info-item-row { margin-bottom:0.75rem; padding-bottom:0.75rem; border-bottom:1px solid rgba(255,255,255,0.05); }
.info-item-name { font-size:0.72rem; color:var(--gold); }
.info-item-desc { font-size:0.65rem; color:var(--text-dim); line-height:1.7; margin-top:0.15rem; }
.info-empty { font-size:0.65rem; color:var(--text-ghost); text-align:center; margin-top:2rem; }

/* Ending */
#screen-ending { flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:2rem 1rem; text-align:center; }
.ending-title { font-family:var(--font-display); font-size:2rem; letter-spacing:0.2em; margin-bottom:1rem; color:var(--gold); }
.ending-text { max-width:500px; line-height:2; color:var(--text-dim); margin-bottom:2rem; font-size:0.9rem; }
.restart-btn { background:var(--red-dim); border:1px solid var(--red); border-radius:0.7rem; padding:0.7rem 2rem; color:var(--text-main); font-family:var(--font-display); font-size:1rem; cursor:pointer; letter-spacing:0.2em; }

</style>
</head>
<body>
<div class="bg-wash"></div>

<!-- INTRO -->
<section id="screen-intro" class="screen active">
  <div class="intro-era">康熙七年 · 書劍江湖</div>
  <h1 class="intro-title">書　劍</h1>
  <div class="intro-subtitle">武俠文字遊戲</div>
  <span class="version-badge">測試版本三</span>
  <div class="brush-line"></div>
  <div class="intro-card">
    <div>
      <label class="form-label">俠客之名</label>
      <input id="player-name" class="name-input" type="text" placeholder="輸入你的名字" maxlength="10">
    </div>
    <div>
      <label class="form-label">選擇出身</label>
      <div id="p1" class="origin-page active"></div>
      <div id="p2" class="origin-page"></div>
      <div class="page-nav" style="margin-top:0.5rem">
        <button class="page-nav-btn active-pg" onclick="goPage(1)">第一頁</button>
        <button class="page-nav-btn" onclick="goPage(2)">第二頁</button>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">踏入江湖</button>
  </div>
  <details class="api-details">
    <summary>API 設定</summary>
    <div class="api-inner">
      <select id="api-provider">
        <option value="silra">Silra（推薦）</option>
        <option value="deepseek">DeepSeek 官方</option>
        <option value="openai">OpenAI</option>
      </select>
      <input type="password" id="api-key-input" placeholder="輸入 API Key（空白為示範模式）">
      <input type="number" id="qi-input" placeholder="真氣次數限制（空白為無限）" min="1">
      <div class="save-row">
        <button class="sv-btn" onclick="loadGame()" id="load-btn" style="display:none">讀取存檔</button>
        <button class="sv-btn" onclick="deleteSave()" id="del-btn" style="display:none">刪除存檔</button>
        <button class="sv-btn" onclick="exportSave()" id="export-btn" style="display:none">匯出存檔</button>
        <label class="sv-btn" style="cursor:pointer">匯入存檔<input type="file" accept=".json" onchange="importSave(event)" style="display:none"></label>
      </div>
      <p class="api-note">不填 API Key 可用示範模式體驗。Silra 申請：<a href="https://api.silra.cn" target="_blank">api.silra.cn</a></p>
    </div>
  </details>
</section>

<!-- GAME -->
<section id="screen-game" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-name">書劍</div>
      <div class="topbar-sub">康熙 <span id="topbar-year">1668</span> 年 · 第 <span id="topbar-turn">1</span> 回合</div>
    </div>
    <div class="stats-grid">
      <div class="stat-chip hp"><span class="sl">♥</span><span class="sv" id="stat-hp">100</span></div>
      <div class="stat-chip gold"><span class="sl">兩</span><span class="sv" id="stat-silver">100</span></div>
      <div class="stat-chip"><span class="sl">氣</span><span class="sv" id="stat-qi">—</span></div>
      <div class="stat-chip"><span class="sl">出身</span><span class="sv" id="stat-origin">—</span></div>
      <div class="stat-chip rank"><span class="sv" id="stat-rank">初學乍練 10</span></div>
      <div class="stat-chip"><span class="sl">名</span><span class="sv" id="stat-fame">5</span></div>
      <div class="stat-chip"><span class="sl">地</span><span class="sv" id="stat-loc">北京</span></div>
    </div>
  </div>

  <div class="game-layout">
    <div class="story-card">
      <span class="chapter-label" id="chapter-label">第1回合 · 北京</span>
      <div id="story-text"></div><span id="cursor" class="cursor" style="display:none"></span>
      <div class="loading" id="loading">正在生成故事</div>
      <div class="error-banner" id="error-banner"></div>
    </div>

    <div class="choices-section">
      <span class="choices-label">你的選擇（輸入數字 1–4）</span>
      <button class="choice-btn" id="c1"><span class="choice-num">1</span><span class="choice-text"></span></button>
      <button class="choice-btn" id="c2"><span class="choice-num">2</span><span class="choice-text"></span></button>
      <button class="choice-btn" id="c3"><span class="choice-num">3</span><span class="choice-text"></span></button>
      <button class="choice-btn" id="c4"><span class="choice-num">4</span><span class="choice-text"></span></button>
    </div>

    <div class="panels-row" id="panels-row" style="display:none">
      <!-- Faction reputation -->
      <div class="panel-card">
        <div class="panel-title">各方勢力好感</div>
        <div class="rep-row"><span class="rep-name">朝廷</span><div class="rep-bar-bg"><div id="rb-chaoting" class="rep-bar rb-chaoting"></div></div><span class="rep-val" id="rv-chaoting">0</span></div>

function renderItemList(el, filterCat){
  var filtered = filterCat==='全部' ? playerItems : playerItems.filter(function(i){ return getCat(i)===filterCat; });
  if(filtered.length===0){ el.innerHTML = '<span style="font-size:0.65rem;color:#6a5a4a">此分類暫無物品</span>'; return; }
  var groups = {};
  filtered.forEach(function(i){ var c=getCat(i); if(!groups[c]) groups[c]=[]; groups[c].push(i); });
  var html = '';
  Object.keys(groups).forEach(function(cat){
    html += '<span class="item-group-label">' + cat + '</span>';
    groups[cat].forEach(function(i){ html += '<span class="item-tag">' + i + '</span> '; });
  });
  el.innerHTML = html;
}

function setItemFilter(cat, btn){

}

function updateItems(){
  if(playerItems.length===0){ itemsPanel.style.display='none'; return; }
  itemsPanel.style.display = 'block';

function updateQiDisplay(){
  var el = document.getElementById('stat-qi');
  if(el) el.textContent = qiRemaining > 0 ? qiRemaining : '—';
}

function disableChoices(){ choiceBtns.forEach(function(b){ b.disabled=true; }); }
function enableChoices(){  choiceBtns.forEach(function(b){ b.disabled=false; }); }

function showChoices(choices, delay){
  var arr = choices||[];
  choiceBtns.forEach(function(btn, i){
    if(i < arr.length){
      btn.style.display = 'flex';
      btn.querySelector('.choice-text').textContent = arr[i];

function addClue(text){
  if(!text || clues.indexOf(text)>=0) return;
  clues.push(text);
  cluesPanel.style.display = 'block';
  var el = document.createElement('div');
  el.className = 'clue-item';

function addToHistory(choice, summary){
  historyLog.push({choice:choice, summary:summary});
  historySection.style.display = 'block';
  var el = document.createElement('div');
  el.className = 'history-item';
  el.innerHTML = '<span class="hi-c">▸ ' + choice + '</span>' + summary;

async function typewriter(text, speed){
  speed = speed||30;
  storyText.textContent = '';
  cursorEl.style.display = 'inline-block';
  isTyping = true;
  for(var i=0; i<text.length; i++){
    storyText.textContent += text[i];
    await new Promise(function(r){ setTimeout(r, speed); });
  }
  cursorEl.style.display = 'none';
  isTyping = false;
}

// ======= AI CALL (STREAMING) =======
async function callAI(userMsg){
  var msgs = [{role:'system', content:buildSystemPrompt()}].concat(conversationHistory).concat([{role:'user', content:userMsg}]);
  var endpoint = apiProvider==='openai' ? 'https://api.openai.com/v1/chat/completions'
               : apiProvider==='silra'  ? 'https://api.silra.cn/v1/chat/completions'
               : 'https://api.deepseek.com/v1/chat/completions';
  var model = apiProvider==='openai' ? 'gpt-4o-mini' : 'deepseek-v3';
  var payload = {model:model, messages:msgs, temperature:0.85, top_p:0.9, max_tokens:1200, stream:true};
  if(apiProvider==='silra') { payload.frequency_penalty=0; payload.presence_penalty=0; }

  var res = await fetch(endpoint, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify(payload)
  });
  if(!res.ok){
    var e = await res.json().catch(function(){ return {}; });
    throw new Error((e.error && e.error.message) || 'HTTP '+res.status);
  }

  var reader = res.body.getReader();
  var decoder = new TextDecoder();
  var fullText = '';
  loadingEl.classList.remove('active');
  storyText.textContent = '';
  cursorEl.style.display = 'inline-block';
  isTyping = true;

  while(true){
    var chunk = await reader.read();
    if(chunk.done) break;
    var text = decoder.decode(chunk.value, {stream:true});
    var lines = text.split('\n');
    for(var i=0; i<lines.length; i++){
      var line = lines[i];
      if(line.indexOf('data: ')===0 && line !== 'data: [DONE]'){
        try{
          var delta = JSON.parse(line.slice(6)).choices[0].delta.content || '';
          fullText += delta;
          // Extract story value in real-time using simple string parsing
          var storyStart = fullText.indexOf('"story"');
          if(storyStart >= 0){
            var quoteStart = fullText.indexOf('"', storyStart + 7);
            if(quoteStart >= 0){
              var storyVal = '';
              var j = quoteStart + 1;
              while(j < fullText.length){
                var ch = fullText[j];
                if(ch === '\\' && j+1 < fullText.length){ storyVal += fullText[j+1]; j+=2; }
                else if(ch === '"'){ break; }
                else { storyVal += ch; j++; }
              }
              if(storyVal) storyText.textContent = storyVal;
            }
          }
        }catch(e){}
      }
    }
  }
  cursorEl.style.display = 'none';
  isTyping = false;

  // Parse JSON from full response
  var raw = fullText.trim();
  // Remove markdown code fences
  raw = raw.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/\s*```$/, '').trim();
  var start = raw.indexOf('{');
  var end   = raw.lastIndexOf('}');
  if(start < 0 || end < 0) throw new Error('AI 回應格式錯誤，請重試');
  var content = raw.slice(start, end+1);
  var parsed;
  try { parsed = JSON.parse(content); }
  catch(e){
    var fixed = content.replace(/,(\s*[}\]])/g, '$1');
    try { parsed = JSON.parse(fixed); }
    catch(e2){ throw new Error('回應格式錯誤，請再試一次'); }
  }
  conversationHistory.push({role:'user',content:userMsg},{role:'assistant',content:JSON.stringify(parsed)});
  if(conversationHistory.length > 16) conversationHistory = conversationHistory.slice(-16);
  return parsed;
}

// ======= GENERATE STORY =======
async function generateStory(choiceMade){
  if(isTyping) return;
  disableChoices();
  errorBanner.classList.remove('show');
  loadingEl.classList.add('active');

  var userMsg = choiceMade
    ? '我選擇：' + choiceMade
    : '開始遊戲。玩家' + playerName + '，出身' + playerOrigin + '，在' + (ORIGINS[playerOrigin]&&ORIGINS[playerOrigin].loc||'北京') + '，康熙七年初春。';

  var result;
  try{
    if(!apiKey){
      await new Promise(function(r){ setTimeout(r, 900); });
      result = getDemoScene();
    } else {
      result = await callAI(userMsg);
    }
  }catch(err){
    isTyping = false;
    cursorEl.style.display = 'none';
    loadingEl.classList.remove('active');
    errorBanner.textContent = '⚠️ ' + (err.message || '無法連接 AI，請重試');
    errorBanner.classList.add('show');
    enableChoices();
    console.error('[書劍]', err);
    return;
  }

  if(!apiKey) loadingEl.classList.remove('active');

  // Snapshot for delta
  var oldHp = playerStats.hp, oldSilver = playerStats.silver, oldFame = playerStats.fame;
  var oldAttrs = Object.assign({}, playerAttrs);
  var oldFavor = Object.assign({}, factionFavor);

  // Apply result
  if(result.stats){
    playerStats = Object.assign({}, playerStats, result.stats);
    playerStats.silver = Math.max(0, playerStats.silver||0);
    turnNum = result.stats.turn || turnNum+1;
  }
  if(result.stats && result.stats.attrs) playerAttrs = Object.assign({}, playerAttrs, result.stats.attrs);
  if(result.favor_delta){
    Object.keys(result.favor_delta).forEach(function(k){
      if(factionFavor[k]!==undefined) factionFavor[k] = Math.max(-100, Math.min(100, factionFavor[k]+(result.favor_delta[k]||0)));
    });
  }
  if(result.items_add && result.items_add.length){
    result.items_add.forEach(function(entry){
      var parts = entry.split('|');
      var name = parts[0].trim();
      if(!name || /^白銀\d+兩$/.test(name)) return;
      if(playerItems.indexOf(name)<0) playerItems.push(name);
      if(parts.length>=3){ playerItemCats[name]=parts[1].trim(); playerItemDescs[name]=parts[2].trim().slice(0,20); }
      else if(parts.length===2){ playerItemDescs[name]=parts[1].trim().slice(0,20); }
    });
  }
  if(result.items_remove && result.items_remove.length){
    playerItems = playerItems.filter(function(i){ return result.items_remove.indexOf(i)<0; });
  }
  if(result.clue) addClue(result.clue);

  // Build delta string
  var attrNames = {tizhi:'體魄',neili:'內力',wuyi:'武藝',shenfa:'身法',zhimou:'智謀',meili:'魅力'};
  var facNames  = {chaoting:'朝廷',sanfan:'三藩',wulin:'武林',xuelian:'血蓮宗',zhuhong:'朱紅閣'};
  var deltas = [];
  var dHp = playerStats.hp - oldHp;
  var dSilver = playerStats.silver - oldSilver;
  var dFame = playerStats.fame - oldFame;
  if(dHp!==0) deltas.push('體力'+(dHp>0?'+':'')+dHp);
  if(dSilver!==0) deltas.push('銀兩'+(dSilver>0?'+':'')+dSilver);
  if(dFame!==0) deltas.push('名望'+(dFame>0?'+':'')+dFame);
  Object.keys(attrNames).forEach(function(k){ var d=playerAttrs[k]-oldAttrs[k]; if(d!==0) deltas.push(attrNames[k]+(d>0?'+':'')+d); });
  Object.keys(facNames).forEach(function(k){ var d=factionFavor[k]-oldFavor[k]; if(d!==0) deltas.push(facNames[k]+'好感'+(d>0?'+':'')+d); });
  if(result.items_add && result.items_add.length) result.items_add.forEach(function(i){ deltas.push('獲得【'+i.split('|')[0]+'】'); });
  if(result.items_remove && result.items_remove.length) result.items_remove.forEach(function(i){ deltas.push('失去【'+i+'】'); });

  updateStats(); updateFavors(); updateAttrs(); updateItems();
  if(apiKey && qiRemaining>0){ qiRemaining--; updateQiDisplay(); }
  if(choiceMade) addToHistory(choiceMade, (result.story||'').slice(0,48)+'…');

  // Show story for demo mode (API already streamed it)
  if(!apiKey){ storyText.textContent=''; await typewriter(result.story||''); }
  else if(!storyText.textContent.trim()){ await typewriter(result.story||''); }

  // Append delta
  if(deltas.length > 0){
    var deltaEl = document.createElement('div');
    deltaEl.style.cssText = 'margin-top:0.8rem;font-size:0.72rem;color:#6a5a4a;line-height:2;';
    deltaEl.textContent = '（' + deltas.join('　') + '）';
    storyText.appendChild(deltaEl);
  }

  if(result.ending){ setTimeout(function(){ showEnding(result.story||''); }, 1500); return; }
  showChoices(result.choices||[], 200);
}

// ======= ORIGIN SELECTION =======
var currentPage = 1;
var originKeys = Object.keys(ORIGINS);

function renderOrigins(page){
  var perPage = 5;
  var start = (page-1)*perPage;
  var items = originKeys.slice(start, start+perPage);
  var pages = Math.ceil(originKeys.length/perPage);
  ['p1','p2'].forEach(function(pid){
    var el = document.getElementById(pid);
    if(el) el.classList.remove('active');
  });
  var pageEl = document.getElementById('p'+page);
  if(!pageEl) return;
  pageEl.innerHTML = '';
  items.forEach(function(k, idx){
    var o = ORIGINS[k];
    var btn = document.createElement('button');
    btn.className = 'origin-btn' + (playerOrigin===k?' selected':'');
    var attrHighlight = Object.entries(o.attrs).filter(function(e){ return e[1]>10; }).map(function(e){ return ['tizhi','neili','wuyi','shenfa','zhimou','meili'].indexOf(e[0])>=0 ? (['體魄','內力','武藝','身法','智謀','魅力'][['tizhi','neili','wuyi','shenfa','zhimou','meili'].indexOf(e[0])]+'+') : ''; }).join('');
    btn.innerHTML = '<span class="ob-icon">' + ['🏯','📚','🗡️','🌑','⚓','👑','💰','🐺','❄️'][start+idx] + '</span>'
      + '<span class="ob-text">' + k + '<br><span style="font-size:0.65rem;opacity:0.7">' + o.loc + '</span></span>'
      + '<span class="ob-hint"><span class="hint-label">銀兩</span><span class="hint-val">' + o.silver + '</span></span>';
    btn.onclick = function(){ selectOrigin(k); };
    pageEl.appendChild(btn);
  });
  pageEl.classList.add('active');
  document.querySelectorAll('.page-nav-btn').forEach(function(b, i){
    b.classList.toggle('active-pg', i+1===page);
  });
}

function selectOrigin(key){
  playerOrigin = key;
  document.querySelectorAll('.origin-btn').forEach(function(b){ b.classList.remove('selected'); });
  event.currentTarget && event.currentTarget.classList.add('selected');
  renderOrigins(currentPage);
}

function goPage(p){ currentPage=p; renderOrigins(p); }

// ======= START GAME =======
function startGame(){
  if(!playerOrigin){ showToast('請先選擇出身背景'); return; }
  playerName = document.getElementById('player-name').value.trim() || '無名俠客';
  apiKey = document.getElementById('api-key-input').value.trim();
  apiProvider = document.getElementById('api-provider').value;

  var o = ORIGINS[playerOrigin];
  Object.keys(o.favor).forEach(function(k){ if(factionFavor[k]!==undefined) factionFavor[k]+=(o.favor[k]||0); });
  playerAttrs = Object.assign({}, playerAttrs, o.attrs);
  playerStats.silver = o.silver;
  playerStats.fame = o.attrs.fame||5;
  playerStats.location = o.loc;
  playerItems = o.items.filter(function(i){ return !/^白銀\d+兩$/.test(i.trim()); });

  var qiVal = parseInt(document.getElementById('qi-input').value);
  if(!isNaN(qiVal) && qiVal>0){ qiRemaining=qiVal; }

  screenIntro.classList.remove('active');
  screenGame.classList.add('active');
  document.getElementById('topbar-name').textContent = playerName + ' · 書劍';
  document.getElementById('stat-origin').textContent = playerOrigin.slice(0,4);
  updateStats(); updateFavors(); updateAttrs(); updateItems();
  panelsRow.style.display = 'grid';
  document.getElementById('info-btn').style.display = 'flex';
  updateQiDisplay();
  generateStory(null);
}

// ======= ENDING =======
function showEnding(finalStory){
  var top = Object.entries(factionFavor).sort(function(a,b){ return b[1]-a[1]; })[0];
  var fnames = {chaoting:'朝廷之臣',sanfan:'三藩之雄',wulin:'武林宗師',xuelian:'血蓮護法',zhuhong:'朱紅英雄'};
  document.getElementById('ending-title').textContent = playerName + ' — ' + (fnames[top[0]]||'江湖傳說');
  document.getElementById('ending-text').textContent = finalStory;
  screenEnding.classList.add('active');
}
document.getElementById('restart-btn').onclick = function(){ location.reload(); };

// ======= SAVE / LOAD =======
function saveGame(){
  var d = {playerName,playerOrigin,apiProvider,playerStats,playerAttrs,factionFavor,playerItems,playerItemDescs,playerItemCats,clues,historyLog,conversationHistory,turnNum,qiRemaining,savedAt:new Date().toLocaleString('zh-HK')};
  localStorage.setItem('wuxia_v3_save', JSON.stringify(d));
  showToast('存檔成功 ✓');
  updateSaveBtn();
}
function loadGame(){
  var raw = localStorage.getItem('wuxia_v3_save');
  if(!raw){ showToast('沒有存檔記錄'); return; }
  var d = JSON.parse(raw);
  playerName=d.playerName; playerOrigin=d.playerOrigin; apiProvider=d.apiProvider||'silra';
  playerStats=d.playerStats; playerStats.silver=Math.max(0,playerStats.silver||0);
  playerAttrs=d.playerAttrs; factionFavor=d.factionFavor;
  playerItems=(d.playerItems||[]).filter(function(i){ return !/^白銀\d+兩$/.test(i.trim()); });
  playerItemDescs=Object.assign({},d.playerItemDescs||{});
  playerItemCats=Object.assign({},d.playerItemCats||{});
  clues=d.clues||[]; historyLog=d.historyLog||[];
  conversationHistory=d.conversationHistory||[]; turnNum=d.turnNum||1; qiRemaining=d.qiRemaining||0;
  apiKey=document.getElementById('api-key-input').value.trim();
  screenIntro.classList.remove('active');
  screenGame.classList.add('active');
  document.getElementById('topbar-name').textContent = playerName + ' · 書劍';
  document.getElementById('stat-origin').textContent = playerOrigin.slice(0,4);
  updateStats(); updateFavors(); updateAttrs(); updateItems();
  panelsRow.style.display = 'grid';
  document.getElementById('info-btn').style.display = 'flex';
  if(clues.length>0){ cluesPanel.style.display='block'; clues.forEach(function(c){ var el=document.createElement('div'); el.className='clue-item'; el.textContent=c; document.getElementById('clues-list').appendChild(el); }); }
  if(historyLog.length>0){ historySection.style.display='block'; historyList.innerHTML=historyLog.map(function(h){ return '<div class="history-item"><span class="hi-c">▸ '+h.choice+'</span>'+h.summary+'</div>'; }).join(''); }
  showToast('讀取存檔：'+d.savedAt);
  generateStory(null);
}
function deleteSave(){ localStorage.removeItem('wuxia_v3_save'); showToast('存檔已刪除'); updateSaveBtn(); }
function exportSave(){
  var raw=localStorage.getItem('wuxia_v3_save');
  if(!raw){ showToast('請先存檔再匯出'); return; }
  var blob=new Blob([raw],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='書劍v3_'+playerName+'_第'+turnNum+'回合.json';
  a.click(); URL.revokeObjectURL(url); showToast('存檔已匯出 ✓');
}
function importSave(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){ try{ var d=JSON.parse(ev.target.result); localStorage.setItem('wuxia_v3_save',JSON.stringify(d)); showToast('存檔已匯入，請點「讀取存檔」繼續'); updateSaveBtn(); }catch(e){ showToast('檔案格式錯誤'); } };
  reader.readAsText(file);
}
function updateSaveBtn(){
  var has=!!localStorage.getItem('wuxia_v3_save');
  ['load-btn','del-btn','export-btn'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display=has?'inline-block':'none'; });
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(44,58,74,0.9);color:#f4f9fd;padding:0.5rem 1.2rem;border-radius:2rem;font-size:0.75rem;letter-spacing:0.15em;z-index:999;pointer-events:none;font-family:serif;transition:opacity 0.4s;'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer); t._timer=setTimeout(function(){ t.style.opacity='0'; },2200);
}

// ======= INFO DRAWER =======
function openInfoDrawer(){ document.getElementById('info-drawer').classList.add('open'); document.getElementById('info-overlay').classList.add('open'); showInfoTab('attrs'); }
function closeInfoDrawer(){ document.getElementById('info-drawer').classList.remove('open'); document.getElementById('info-overlay').classList.remove('open'); }

function showInfoTab(tab){
  document.querySelectorAll('.info-tab').forEach(function(b,i){ b.classList.toggle('active',(tab==='attrs'&&i===0)||(tab==='items'&&i===1)); });
  var content = document.getElementById('info-content');
  if(tab==='attrs'){
    var html='';
    Object.keys(ATTR_DESCS).forEach(function(k){
      var d=ATTR_DESCS[k]; var v=playerAttrs[k]||10; var m=Math.floor((v-10)/2);
      html += '<div class="info-attr-row"><span class="info-attr-name">'+d.name+'</span><span class="info-attr-val"> '+v+'（調整值'+(m>=0?'+':'')+m+'）</span><div class="info-attr-desc">'+d.desc+'</div></div>';
    });
    content.innerHTML = html;
  } else {
    if(playerItems.length===0){ content.innerHTML='<div class="info-empty">尚無隨身物品</div>'; return; }
    var presentCats=[];
    playerItems.forEach(function(i){ var c=getCat(i); if(presentCats.indexOf(c)<0) presentCats.push(c); });
    var catBtns='<div class="cat-filter-bar" style="margin-bottom:0.7rem"><button class="cat-btn c-all active" id="iall" onclick="filterInfoItems(\'全部\')">全部</button>';
    presentCats.forEach(function(cat){ catBtns += '<button class="cat-btn c-'+cat+'" id="ic-'+cat+'" onclick="filterInfoItems(\''+cat+'\')">'+cat+'</button>'; });
    catBtns += '</div><div id="info-item-list"></div>';
    content.innerHTML = catBtns;
    filterInfoItems('全部');
  }
}

function filterInfoItems(cat){
  document.querySelectorAll('[id^="ic-"],[id="iall"]').forEach(function(b){ b.classList.toggle('active', b.id==='ic-'+cat || (cat==='全部'&&b.id==='iall')); });
  var list=document.getElementById('info-item-list');
  if(!list) return;
  var filtered=cat==='全部'?playerItems:playerItems.filter(function(i){ return getCat(i)===cat; });
  if(filtered.length===0){ list.innerHTML='<div class="info-empty">此分類暫無物品</div>'; return; }
  list.innerHTML=filtered.map(function(i){
    var desc=playerItemDescs[i]||ITEM_DESCS_DEFAULT[i]||'神秘物品';
    var c=getCat(i);
    return '<div class="info-item-row"><div class="info-item-name"><span class="cat-btn c-'+c+'" style="font-size:0.55rem;padding:0.1rem 0.35rem;margin-right:0.3rem;cursor:default;">'+c+'</span>【'+i+'】</div><div class="info-item-desc">'+desc+'</div></div>';
  }).join('');
}
